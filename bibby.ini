# bibby — brew controller configuration
#
# Key parameters another person or another brew setup would need to change.
# Both processes (frontend and heater-controller) read this same file at
# startup. Edit values here; no rebuild is required.
#
# Lookup order: $BIBBY_CONFIG, then the path baked in at build time
# (BIBBY_CONFIG_PATH, defaults to this file in the source tree).
# Comments start with '#' or ';'. Missing keys fall back to safe defaults.

[mains]
# AC line frequency. 60 = North America, 50 = most of the rest of the world.
# Sets the heater zero-cross watchdog timeout and the frontend-stale timeout.
frequency_hz = 60

[element1]
# SSR1 heating element (GPIO21 / pin 40).
watts    = 2500    ; rated electrical power, W
area_cm2 = 150     ; wetted surface area, cm^2 (for power-density limiting)

[element2]
# SSR2 heating element (GPIO26 / pin 37).
watts    = 2500
area_cm2 = 150

[pid]
# Temperature-loop gains. Output is a duty fraction in [0, 1], evaluated once
# per filtered sample. Defaults are zero (auto mode commands no power) until the
# loop is tuned — see README §9.3.
kp = 0.0
ki = 0.0
kd = 0.0

[sensor]
# Per-unit RTD calibration. These depend on the specific PT100 probe and the
# MAX31865 reference resistor, so they MUST be re-derived for any other board
# or probe (README §9 walks through the procedure). Leaving them at the
# identity defaults below gives an uncalibrated sensor.
#   defaults: ref_resistor_ohms = 400, temp_cal_gain = 1.0, temp_cal_offset = 0.0
#
# ref_resistor_ohms — MAX31865 Rref, ice-point trimmed (README §9.1).
#   The driver computes R_rtd = (raw / 32768) * Rref, so Rref scales the whole
#   resistance reading. Start from the board's nominal reference (400 Ohm here),
#   read the probe in a 0 C ice bath, and trim so it reads exactly 0 C:
#     Rref = Rref_nominal * 100.0 / R_pt100(T_ice_measured)
#   This unit read +1.4 C at the ice point, R_pt100(1.4) = 100.547 Ohm:
#     Rref = 400 * 100.0 / 100.547 = 397.82
ref_resistor_ohms = 397.82
#
# temp_cal_gain / temp_cal_offset — two-point span trim (README §9.2).
#   Applied as T_true = temp_cal_gain * T_measured + temp_cal_offset on the
#   Callendar–Van Dusen output, AFTER the Rref trim above. Take two reference
#   points (T1_ref, T1_meas) and (T2_ref, T2_meas):
#     temp_cal_gain   = (T2_ref - T1_ref) / (T2_meas - T1_meas)
#     temp_cal_offset = T1_ref - temp_cal_gain * T1_meas
#   This unit used the ice point (0.000 ref / 0.000 meas after the Rref trim)
#   and a fan-mixed ambient point (25.00 ref / 23.78 meas):
#     gain   = (25.00 - 0.0) / (23.78 - 0.0) = 1.0513   (tuned to 1.0528)
#     offset = 0.0 - 1.0528 * 0.0            = -0.032
#   PROVISIONAL: both points are <= 25 C. Confirm against a boiling-point
#   reference (corrected for your altitude) before trusting brew-range temps.
temp_cal_gain   = 1.0528
temp_cal_offset = -0.032
